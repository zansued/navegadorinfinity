events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # Painel do Cliente (hub.infinityclaude.pro)
    server {
        listen 80;
        server_name hub.infinityclaude.pro;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Permite download direto do launcher na VPS
        location /Infinity_AI_Cliente_Dist.zip {
            root /usr/share/nginx/html;
            default_type application/zip;
            add_header Content-Disposition 'attachment; filename="Infinity_AI_Cliente_Dist.zip"';
        }
    }

    # Painel Administrativo (navegador.infinityclaude.pro)
    server {
        listen 80;
        server_name navegador.infinityclaude.pro;

        location / {
            root /usr/share/nginx/html;
            # Mapeia a raiz diretamente para o admin.html
            index admin.html;
            try_files $uri $uri/ /admin.html;
        }
    }
}
